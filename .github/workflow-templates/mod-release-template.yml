name: Release Mod

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  JAVA_VERSION: "21"
  BUILD_COMMAND: "./gradlew build"
  ARTIFACT_GLOB: "build/libs/*.jar"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mod repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Build JAR artifacts
        shell: bash
        run: $BUILD_COMMAND

      - name: Resolve release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t files < <(compgen -G "$ARTIFACT_GLOB" || true)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No artifacts found for glob: $ARTIFACT_GLOB" >&2
            exit 1
          fi

          printf 'files<<EOF\n' >> "$GITHUB_OUTPUT"
          printf '%s\n' "${files[@]}" >> "$GITHUB_OUTPUT"
          printf 'EOF\n' >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release for tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" > /dev/null 2>&1; then
            gh release upload "$tag" ${{ steps.artifacts.outputs.files }} --clobber
          else
            gh release create "$tag" ${{ steps.artifacts.outputs.files }} --generate-notes --title "$tag"
          fi

