name: Build And Publish Site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --immutable

      - name: Build site
        run: yarn build

      - name: Checkout hosting branch snapshot
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-snapshot
        continue-on-error: true

      - name: Preserve latest release JSON from hosting branch
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d gh-pages-snapshot/data/mods ]]; then
            echo "No existing release JSON snapshot found on gh-pages branch."
            exit 0
          fi

          while IFS= read -r file; do
            rel_path="${file#gh-pages-snapshot/}"
            mkdir -p "dist/$(dirname "$rel_path")"
            cp "$file" "dist/$rel_path"
          done < <(find gh-pages-snapshot/data/mods -name latest-release.json -type f)

      - name: Publish dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
